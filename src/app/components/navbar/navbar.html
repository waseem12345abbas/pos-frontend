<aside class="sidebar">
  <!-- Logo -->
  <div class="logo-area">
    <div class="logo-icon">💊</div>
    <div class="logo-text">
      <span class="logo-title">Pharma POS</span>
      <span class="logo-sub">Management System</span>
    </div>
  </div>

  <!-- Nav links -->
  <nav class="nav">
    <a *ngFor="let item of navItems"
       [routerLink]="item.path"
       routerLinkActive="active"
       [routerLinkActiveOptions]="{ exact: item.exact || false }"
       class="nav-link">
      <span class="nav-icon">{{ item.icon }}</span>
      <span class="nav-label">{{ item.label }}</span>
    </a>
  </nav>

  <!-- Settings at bottom -->
  <div class="sidebar-footer">
    <a routerLink="/settings" routerLinkActive="active" class="nav-link">
      <span class="nav-icon">⚙️</span>
      <span class="nav-label">Settings</span>
    </a>
    <div class="theme-toggles">
      <button class="theme-btn"
              [class.active-theme]="themeService.getTheme() === 'blue'"
              (click)="themeService.setTheme('blue')"
              title="Light Blue Theme">☀️</button>
      <button class="theme-btn"
              [class.active-theme]="themeService.getTheme() === 'dark'"
              (click)="themeService.setTheme('dark')"
              title="Dark Theme">🌙</button>
    </div>
  </div>
</aside>
